<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medical Writing Timeline</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>Timeline</h1>
            <p>Medical Writing</p>
          </div>
          <button id="newProjectBtn" class="primary">新建</button>
        </div>
        <input id="projectSearch" class="search" type="search" placeholder="搜索项目">
        <div id="projectList" class="project-list"></div>
        <div class="sidebar-actions">
          <button id="exportLibraryBtn">导出项目库</button>
          <label class="file-button">
            导入项目库
            <input id="importLibraryInput" type="file" accept="application/json,.json">
          </label>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="field compact grow">
            <label for="projectName">项目名称</label>
            <input id="projectName" type="text">
          </div>
          <div class="field compact">
            <label for="templateSelect">模板</label>
            <select id="templateSelect"></select>
          </div>
        </header>

        <div class="toolbar">
          <button id="saveProjectBtn">保存</button>
          <button id="exportExcelBtn">导出Excel</button>
          <button id="updateHolidaysBtn">节假日管理</button>
          <button id="deleteProjectBtn" class="danger">删除项目</button>
          <span id="statusLine" class="status-line"></span>
        </div>

        <section class="table-wrap">
          <table class="timeline-table">
            <colgroup>
              <col style="width: 60px">
              <col style="width: 200px">
              <col style="width: 260px">
              <col style="width: 210px">
              <col style="width: 130px">
              <col style="width: 150px">
              <col style="width: 150px">
            </colgroup>
            <thead>
              <tr>
                <th>序号<span class="col-resizer"></span></th>
                <th>任务范围<span class="col-resizer"></span></th>
                <th>任务名称<span class="col-resizer"></span></th>
                <th>任务负责人<span class="col-resizer"></span></th>
                <th>Duration 工作日<span class="col-resizer"></span></th>
                <th>计划开始日期<span class="col-resizer"></span></th>
                <th>计划结束日期<span class="col-resizer"></span></th>
              </tr>
            </thead>
            <tbody id="timelineBody"></tbody>
          </table>
        </section>
      </section>
    </main>
    <div id="rowMenu" class="row-menu" hidden>
      <button data-menu-action="insert-above">上方新增一行</button>
      <button data-menu-action="insert-below">下方新增一行</button>
      <button data-menu-action="copy">复制本行</button>
      <button data-menu-action="up">上移</button>
      <button data-menu-action="down">下移</button>
      <button data-menu-action="clear-cell">清除单元格信息</button>
      <button data-menu-action="highlight-cell">高亮单元格</button>
      <button data-menu-action="highlight-row">高亮行</button>
      <button data-menu-action="clear-highlight">清除高亮</button>
      <button data-menu-action="delete" class="danger">删除本行</button>
    </div>

    <div id="holidayModal" class="modal" hidden>
      <div class="modal-panel">
        <header class="modal-header">
          <h2>节假日管理</h2>
          <button id="holidayModalClose" class="modal-close" aria-label="关闭">×</button>
        </header>
        <div class="modal-body">
          <div class="holiday-controls">
            <div class="field compact">
              <label for="holidayYearSelect">年份</label>
              <select id="holidayYearSelect"></select>
            </div>
            <div class="field compact holiday-year-add">
              <label for="newHolidayYear">新增年份</label>
              <input id="newHolidayYear" type="number" min="2024" max="2099" placeholder="如 2027">
              <button id="addHolidayYearBtn" class="small">添加</button>
            </div>
            <span id="holidayMeta" class="holiday-meta"></span>
          </div>
          <div class="holiday-lists">
            <div class="holiday-list-block">
              <h3>放假日 <span id="offDaysCount" class="count"></span></h3>
              <div id="offDaysList" class="holiday-list"></div>
              <div class="holiday-add-row">
                <input id="newOffDate" type="date">
                <input id="newOffName" type="text" placeholder="名称" maxlength="20">
                <button id="addOffDayBtn" class="small">+ 添加</button>
              </div>
            </div>
            <div class="holiday-list-block">
              <h3>调休工作日 <span id="workDaysCount" class="count"></span></h3>
              <div id="workDaysList" class="holiday-list"></div>
              <div class="holiday-add-row">
                <input id="newWorkDate" type="date">
                <input id="newWorkName" type="text" placeholder="名称" maxlength="20">
                <button id="addWorkDayBtn" class="small">+ 添加</button>
              </div>
            </div>
          </div>
          <p class="holiday-tip" id="holidayTip"></p>
        </div>
        <footer class="modal-footer">
          <button id="holidayRefreshBtn">尝试在线更新</button>
          <button id="holidayResetBtn">重置为内置数据</button>
          <button id="holidayDoneBtn" class="primary">完成</button>
        </footer>
      </div>
    </div>

    <script type="module" src="./app.js?v=20260702-holiday-editor"></script>
  </body>
</html>
